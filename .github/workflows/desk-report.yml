name: desk report

on:
  schedule:
    # 5:30pm ET after the close, weekdays (UTC)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tape-writes
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: refresh the tape
        run: node agents/price-agent.mjs

      - name: write the desk report
        run: node agents/desk-report.mjs

      - name: commit the report
        run: |
          git config user.name "yb-desk-agent"
          git config user.email "yb-desk-agent@users.noreply.github.com"
          git add data
          if [ -d docs/data ]; then git add docs/data; fi
          if git diff --cached --quiet; then
            echo "no report changes, nothing to commit"
          else
            git commit -m "report: daily desk report"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push
          fi
