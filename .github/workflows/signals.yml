name: signals

on:
  schedule:
    # Twice a day on offset minutes (GitHub throttles herd-minute crons).
    # Post-open and post-close, weekdays.
    - cron: '17 14 * * 1-5'
    - cron: '17 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tape-writes
  cancel-in-progress: false

jobs:
  signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install the momentum engine deps
        run: pip install -r agents/vendor/requirements.txt

      - name: compute signals with mphinance momentum engine
        run: python agents/signals_pro.py

      - name: scan the whole market
        run: python agents/scan_pro.py

      - name: run the proving ground
        run: python agents/backtest_pro.py

      - name: commit signals
        run: |
          git config user.name "yb-desk-agent"
          git config user.email "yb-desk-agent@users.noreply.github.com"
          git add data docs/data
          if git diff --cached --quiet; then
            echo "signals unchanged"
          else
            git commit -m "signals: momentum engine update"
            git pull --rebase --autostash origin "$GITHUB_REF_NAME"
            git push
          fi
