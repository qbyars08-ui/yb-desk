name: sentinel

on:
  schedule:
    # Hourly on an offset minute. The sentinel is the self-healing loop:
    # it re-dispatches any producer whose artifact went stale, and its own
    # hourly commit keeps the repo active so GitHub never auto-disables
    # the scheduled workflows.
    - cron: '23 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  issues: write

concurrency:
  group: tape-writes
  cancel-in-progress: false

jobs:
  sentinel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: verify and heal
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node agents/sentinel.mjs

      - name: commit health
        run: |
          git config user.name "yb-desk-agent"
          git config user.email "yb-desk-agent@users.noreply.github.com"
          git add data docs/data
          if git diff --cached --quiet; then
            echo "health unchanged"
          else
            git commit -m "sentinel: health check"
            git pull --rebase --autostash origin "$GITHUB_REF_NAME"
            git push
          fi
