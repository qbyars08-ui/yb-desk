name: price agent

on:
  schedule:
    # Every 30 minutes, US market hours plus the close, weekdays (UTC).
    # Offset minutes: GitHub throttles herd-minute crons (:00/:30, */N)
    # hard, observed slippage was 2+ hours. Odd minutes fire more reliably.
    - cron: '7,37 13-21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: tape-writes
  cancel-in-progress: false

jobs:
  prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: pull the tape
        run: node agents/price-agent.mjs

      - name: run the watchdog
        run: node agents/watchdog.mjs

      - name: commit the tape
        run: |
          git config user.name "yb-desk-agent"
          git config user.email "yb-desk-agent@users.noreply.github.com"
          git add data
          if [ -d docs/data ]; then git add docs/data; fi
          if git diff --cached --quiet; then
            echo "tape unchanged, nothing to commit"
          else
            git commit -m "tape: price update"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push
          fi

      # GitHub delays scheduled crons unpredictably, so every price run also
      # kicks the research queue. Worst-case brief latency then tracks the
      # tape cadence instead of the queue's own slipping schedule. Best
      # effort: a failed dispatch never fails the price run.
      - name: kick the research queue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run research-queue.yml --repo "$GITHUB_REPOSITORY" || echo "queue kick skipped"
